<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Dashboard - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #1e3a5f;
            --primary-light: #2d5a87;
            --secondary-color: #4a90a4;
            --accent-color: #f39c12;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --text-color: #333;
            --text-light: #666;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
            --shadow: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Top Bar */
        .topbar {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .topbar-left h1 {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .topbar-left .badge {
            background: rgba(255,255,255,0.2);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        .topbar-actions {
            display: flex;
            gap: 10px;
        }
        .topbar-actions a, .topbar-actions button {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            transition: background 0.3s;
        }
        .topbar-actions a:hover, .topbar-actions button:hover {
            background: rgba(255,255,255,0.15);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 25px 20px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .stat-card .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .stat-icon.total { background: #e8f0fe; color: var(--primary-color); }
        .stat-icon.useful { background: #e8f8ef; color: var(--success-color); }
        .stat-icon.not-useful { background: #fde8e8; color: var(--danger-color); }
        .stat-icon.comments { background: #fef3e2; color: var(--accent-color); }
        .stat-card .stat-info h3 {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .stat-card .stat-info p {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        /* Satisfaction Bar */
        .satisfaction-bar {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 18px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }
        .satisfaction-bar .label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .bar-track {
            height: 10px;
            background: #fde8e8;
            border-radius: 5px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success-color), #2ecc71);
            border-radius: 5px;
            transition: width 0.8s ease;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            color: var(--text-light);
        }
        .filter-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Feedback List */
        .feedback-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .feedback-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--border-color);
            transition: transform 0.2s;
        }
        .feedback-card:hover { transform: translateY(-1px); }
        .feedback-card.useful { border-left-color: var(--success-color); }
        .feedback-card.not-useful { border-left-color: var(--danger-color); }
        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .feedback-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .feedback-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .feedback-badge.useful { background: #e8f8ef; color: var(--success-color); }
        .feedback-badge.not-useful { background: #fde8e8; color: var(--danger-color); }
        .feedback-id {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        .feedback-date {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        .feedback-comment {
            background: var(--bg-color);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin: 10px 0;
            color: #444;
            font-style: italic;
        }
        .feedback-prediction {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: var(--text-light);
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }
        .feedback-prediction span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 5px;
            transition: color 0.3s;
        }
        .delete-btn:hover { color: var(--danger-color); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        .empty-state h3 {
            margin-bottom: 5px;
            color: #999;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
        .loading i { margin-right: 8px; }

        /* Responsive */
        @media (max-width: 600px) {
            .topbar { flex-direction: column; gap: 10px; text-align: center; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .feedback-prediction { flex-direction: column; gap: 5px; }
            .filter-bar { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <i class="fas fa-chart-bar"></i>
            <h1>Feedback Dashboard</h1>
            <span class="badge">Admin</span>
        </div>
        <div class="topbar-actions">
            <a href="/"><i class="fas fa-home"></i> Main App</a>
            <button onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-icon total"><i class="fas fa-comments"></i></div>
                <div class="stat-info">
                    <h3 id="stat-total">-</h3>
                    <p>Total Feedback</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon useful"><i class="fas fa-thumbs-up"></i></div>
                <div class="stat-info">
                    <h3 id="stat-useful">-</h3>
                    <p>Useful</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon not-useful"><i class="fas fa-thumbs-down"></i></div>
                <div class="stat-info">
                    <h3 id="stat-not-useful">-</h3>
                    <p>Not Useful</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon comments"><i class="fas fa-comment-dots"></i></div>
                <div class="stat-info">
                    <h3 id="stat-comments">-</h3>
                    <p>With Comments</p>
                </div>
            </div>
        </div>

        <!-- Satisfaction Bar -->
        <div class="satisfaction-bar">
            <div class="label">
                <span>User Satisfaction</span>
                <span id="satisfaction-pct">-</span>
            </div>
            <div class="bar-track">
                <div class="bar-fill" id="satisfaction-fill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Filter -->
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterFeedback('all', this)">All</button>
            <button class="filter-btn" onclick="filterFeedback('useful', this)"><i class="fas fa-thumbs-up"></i> Useful</button>
            <button class="filter-btn" onclick="filterFeedback('not-useful', this)"><i class="fas fa-thumbs-down"></i> Not Useful</button>
            <button class="filter-btn" onclick="filterFeedback('comments', this)"><i class="fas fa-comment"></i> With Comments</button>
        </div>

        <!-- Feedback List -->
        <div id="feedback-list" class="feedback-list">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading feedback...</div>
        </div>
    </div>

    <script>
        let allFeedbacks = [];
        let currentFilter = 'all';

        async function loadData() {
            try {
                const [feedbackRes, statsRes] = await Promise.all([
                    fetch('/admin/api/feedbacks'),
                    fetch('/admin/api/feedbacks/stats')
                ]);

                if (feedbackRes.status === 401 || statsRes.status === 401) {
                    window.location.href = '/admin/login';
                    return;
                }

                allFeedbacks = await feedbackRes.json();
                const stats = await statsRes.json();

                // Update stats
                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-useful').textContent = stats.useful;
                document.getElementById('stat-not-useful').textContent = stats.not_useful;
                document.getElementById('stat-comments').textContent = stats.with_comments;
                document.getElementById('satisfaction-pct').textContent = stats.useful_percentage + '%';
                document.getElementById('satisfaction-fill').style.width = stats.useful_percentage + '%';

                renderFeedbacks(allFeedbacks);
            } catch (err) {
                document.getElementById('feedback-list').innerHTML =
                    '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Error loading data</h3><p>' + err.message + '</p></div>';
            }
        }

        function renderFeedbacks(feedbacks) {
            const container = document.getElementById('feedback-list');

            if (feedbacks.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><h3>No feedback yet</h3><p>Feedback will appear here once users submit ratings.</p></div>';
                return;
            }

            container.innerHTML = feedbacks.map(f => {
                const isUseful = f.is_useful;
                const cls = isUseful ? 'useful' : 'not-useful';
                const badgeText = isUseful ? 'Useful' : 'Not Useful';
                const date = f.created_at ? new Date(f.created_at).toLocaleString() : 'Unknown';
                const pred = f.prediction || {};
                const inputData = pred.input_data || {};

                let costStr = pred.predicted_cost ? '₹' + Number(pred.predicted_cost).toLocaleString('en-IN') : 'N/A';
                let typeStr = inputData.project_type || 'N/A';
                let areaStr = inputData.total_area_sqft ? inputData.total_area_sqft.toLocaleString() + ' sqft' : 'N/A';

                let commentHtml = '';
                if (f.comment && f.comment.trim()) {
                    commentHtml = '<div class="feedback-comment">"' + escapeHtml(f.comment) + '"</div>';
                }

                return `
                    <div class="feedback-card ${cls}">
                        <div class="feedback-header">
                            <div class="feedback-meta">
                                <span class="feedback-badge ${cls}">
                                    <i class="fas fa-thumbs-${isUseful ? 'up' : 'down'}"></i> ${badgeText}
                                </span>
                                <span class="feedback-id">#${f.id}</span>
                                <span class="feedback-date"><i class="fas fa-clock"></i> ${date}</span>
                            </div>
                            <button class="delete-btn" onclick="deleteFeedback(${f.id})" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        ${commentHtml}
                        <div class="feedback-prediction">
                            <span><i class="fas fa-link"></i> Prediction #${f.prediction_id}</span>
                            <span><i class="fas fa-building"></i> ${escapeHtml(typeStr)}</span>
                            <span><i class="fas fa-ruler-combined"></i> ${areaStr}</span>
                            <span><i class="fas fa-indian-rupee-sign"></i> ${costStr}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterFeedback(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            let filtered = allFeedbacks;
            if (type === 'useful') filtered = allFeedbacks.filter(f => f.is_useful);
            else if (type === 'not-useful') filtered = allFeedbacks.filter(f => !f.is_useful);
            else if (type === 'comments') filtered = allFeedbacks.filter(f => f.comment && f.comment.trim());

            renderFeedbacks(filtered);
        }

        async function deleteFeedback(id) {
            if (!confirm('Delete this feedback?')) return;

            try {
                const res = await fetch(`/admin/api/feedbacks/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadData(); // Reload everything
                } else {
                    alert('Failed to delete feedback.');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function handleLogout() {
            await fetch('/admin/logout', { method: 'POST' });
            window.location.href = '/admin/login';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load on page ready
        loadData();
    </script>
</body>
</html>
